name: Fetch AQI Data

on:
  schedule:
    - cron: '0 * * * *'  # Every hour
  workflow_dispatch:

jobs:
  fetch-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Set up .env file
        run: |
          echo "AQICN_API_KEY=${{ secrets.AQICN_API_KEY }}" > .env
          echo "CITY=lahore" >> .env

      - name: Run fetch data script
        run: python 1_fetch_data.py

      - name: Commit and push new data
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add data/aqi_lahore.csv data/aqi_historical.csv
          git commit -m 'Update AQI data [GitHub Actions]' || echo "No changes to commit"
          git push
