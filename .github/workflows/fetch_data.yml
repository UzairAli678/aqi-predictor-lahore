name: Fetch AQI Data

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Set up .env file
        run: |
          echo "AQICN_API_KEY=${{ secrets.AQICN_API_KEY }}" > .env
          echo "CITY=lahore" >> .env

      - name: Run fetch data script
        run: python 1_fetch_data.py

      - name: Commit and force push new data
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add data/
          git diff --staged --quiet || git commit -m "Auto fetch AQI data [GitHub Actions]"
          git fetch origin main
          git reset --soft origin/main
          git push --force https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/UzairAli678/aqi-predictor-lahore.git main