name: Train AQI Models

on:
  schedule:
    - cron: '0 0 * * *'  # Every day at midnight
  workflow_dispatch:

jobs:
  train-models:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Set up .env file
        run: |
          echo "AQICN_API_KEY=${{ secrets.AQICN_API_KEY }}" > .env
          echo "CITY=lahore" >> .env

      - name: Run train models script
        run: python 2_train_models.py

      - name: Commit and push updated models
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add models/best_model.pkl models/best_model_name.txt data/model_comparison.csv
          git commit -m 'Update trained models [GitHub Actions]' || echo "No changes to commit"
          git push
