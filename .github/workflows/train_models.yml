name: Train AQI Models

on:
  schedule:
    - cron: '0 0 * * *'  # Every day at midnight
  workflow_dispatch:

permissions:
  contents: write

jobs:
  train-models:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run train models script
        env:
          AQICN_API_KEY: ${{ secrets.AQICN_API_KEY }}
          CITY: lahore
        run: python 2_train_models.py

      - name: Commit and push updated models
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add models/ data/model_comparison.csv
          git diff --staged --quiet || git commit -m "Auto train AQI models"
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/UzairAli678/aqi-predictor-lahore.git HEAD:main
